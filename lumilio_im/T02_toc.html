<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>目次 | CommerceX M&A</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C49000;--gold-light:#F0C830;--cream:#FFF7DC;--gold-border:rgba(196,144,0,0.3);
  --black:#111111;--dark:#333333;--medium:#555555;--muted:#888888;
  --surface:#F5F5F3;--border:#E0E0E0;--border-light:#F0F0F0;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#CCCAC7;
  color:var(--black);
  line-height:1.6;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;
  overflow:hidden;
}
.slide-wrapper{
  width:960px;height:540px;
  transform-origin:center center;
}
.page{
  width:960px;height:540px;
  background:var(--white);
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
.ph{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 48px;height:38px;
  border-bottom:1px solid var(--border-light);flex-shrink:0;
}
.ph-logo{font-size:8px;font-weight:900;letter-spacing:2px;color:var(--muted);}
.ph-sec{font-size:8px;color:var(--muted);font-weight:300;letter-spacing:1px;}
.pc{
  flex:1 1 0%;padding:15px 48px 16px;
  overflow:hidden;min-height:0;
  display:flex;flex-direction:column;
}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0;}
.sn{font-size:12px;font-weight:900;color:var(--gold);}
.st{font-size:13px;letter-spacing:2px;color:var(--black);font-weight:700;}
.sl{flex:1;height:1px;background:var(--border);}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
td,th{overflow:hidden;text-overflow:ellipsis;word-break:break-all;}
.val-lg{font-size:17px;font-weight:700;color:var(--gold);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.val-xl{font-size:21px;font-weight:700;color:var(--gold);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lbl{font-size:7.5px;font-weight:300;color:var(--muted);letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.txt{font-size:9px;color:var(--dark);line-height:1.7;overflow:hidden;}
.txt-sm{font-size:7.5px;color:var(--muted);line-height:1.6;overflow:hidden;}
.hd-gold{font-size:8.5px;font-weight:700;color:var(--gold);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--gold-border);}
@media print{
  body{background:none;overflow:visible;}
  .slide-wrapper{transform:none !important;}
  .page{box-shadow:none;width:100%;height:auto;aspect-ratio:16/9;}
}
</style>
</head>
<body>
<div class="slide-wrapper">

<div class="page">
  <div class="ph"><div class="ph-logo">COMMERCEX M&A</div><div class="ph-sec">Table of Contents</div></div>
  <div class="pc">
    <div style="margin-bottom:8px;flex-shrink:0;">
      <div style="font-size:21px;font-weight:900;color:var(--black);margin-bottom:0.5%;">目次</div>
      <div style="font-size:7.5px;font-weight:300;letter-spacing:3px;color:var(--muted);">TABLE OF CONTENTS</div>
      <div style="width:5%;height:2px;background:var(--gold);margin-top:1%;"></div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;justify-content:center;overflow:hidden;">
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">01</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">会社概要</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">02</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">事業概要・ダッシュボード</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">03</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">ビジネスモデル・ブランド紹介</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">04</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">販売チャネル・マーケティング</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">05</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">財務情報（PL・BS・バリュエーション）</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">06</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">組織・オーナープロフィール</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">07</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">譲渡条件・買い手へのメッセージ</div>
      </div>
      <div style="display:flex;align-items:center;gap:2%;padding:1.2% 0;border-bottom:1px solid var(--border-light);overflow:hidden;">
        <div style="font-size:12px;font-weight:900;color:var(--gold);width:8%;flex-shrink:0;">08</div>
        <div style="font-size:10px;font-weight:500;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">Q&A・次のステップ</div>
      </div>
    </div>
  </div>
</div>

</div>
<script>
(function(){
  var w=document.querySelector('.slide-wrapper');
  function fit(){
    var sx=window.innerWidth/960,sy=window.innerHeight/540;
    var s=Math.min(sx,sy)*0.95;
    w.style.transform='scale('+s+')';
  }
  fit();
  window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
