<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>セクション区切り | CommerceX M&A</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C49000;--gold-light:#F0C830;--cream:#FFF7DC;--gold-border:rgba(196,144,0,0.3);
  --black:#111111;--dark:#333333;--medium:#555555;--muted:#888888;
  --surface:#F5F5F3;--border:#E0E0E0;--border-light:#F0F0F0;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:var(--white);color:var(--black);line-height:1.6;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;overflow:hidden;
}
.slide-wrapper{width:960px;height:540px;transform-origin:center center;}
.page{
  width:960px;height:540px;background:var(--white);
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
  padding:0 80px;
}
.txt{font-size:9px;color:var(--dark);line-height:1.9;overflow:hidden;}
@media print{
  body{background:none;overflow:visible;}
  .slide-wrapper{transform:none !important;}
  .page{box-shadow:none;width:100%;height:auto;aspect-ratio:16/9;}
}
</style>
</head>
<body>
<div class="slide-wrapper">

<div class="page">
  <div style="display:flex;align-items:center;gap:40px;">
    <!-- 左：セクション番号 -->
    <div style="flex-shrink:0;">
      <div style="font-size:56px;font-weight:900;color:var(--gold);line-height:1;">{{section_number}}</div>
      <div style="width:40px;height:2px;background:var(--gold);margin-top:8px;"></div>
      <div style="font-size:8px;font-weight:300;letter-spacing:3px;color:var(--muted);margin-top:6px;">{{section_en}}</div>
    </div>
    <!-- 右：タイトル＋説明 -->
    <div style="flex:1;border-left:1px solid var(--border);padding-left:40px;">
      <div style="font-size:27px;font-weight:900;color:var(--black);margin-bottom:10px;">{{section_title}}</div>
      <div class="txt">{{section_desc}}</div>
    </div>
  </div>
</div>

</div>
<script>
(function(){
  var w=document.querySelector('.slide-wrapper');
  function fit(){
    var sx=window.innerWidth/960,sy=window.innerHeight/540;
    var s=Math.min(sx,sy)*0.95;
    w.style.transform='scale('+s+')';
  }
  fit();
  window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
