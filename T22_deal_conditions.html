<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>譲渡条件詳細 | CommerceX M&A</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C49000;--gold-light:#F0C830;--cream:#FFF7DC;--gold-border:rgba(196,144,0,0.3);
  --black:#111111;--dark:#333333;--medium:#555555;--muted:#888888;
  --surface:#F5F5F3;--border:#E0E0E0;--border-light:#F0F0F0;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#CCCAC7;
  color:var(--black);
  line-height:1.6;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;
  overflow:hidden;
}
.slide-wrapper{
  width:960px;height:540px;
  transform-origin:center center;
}
.page{
  width:960px;height:540px;
  background:var(--white);
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
}
.ph{
  display:flex;justify-content:space-between;align-items:center;
  padding:0 48px;height:38px;
  border-bottom:1px solid var(--border-light);flex-shrink:0;
}
.ph-logo{font-size:8px;font-weight:900;letter-spacing:2px;color:var(--muted);}
.ph-sec{font-size:8px;color:var(--muted);font-weight:300;letter-spacing:1px;}
.pc{
  flex:1 1 0%;padding:15px 48px 16px;
  overflow:hidden;min-height:0;
  display:flex;flex-direction:column;
}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0;}
.sn{font-size:12px;font-weight:900;color:var(--gold);}
.st{font-size:13px;letter-spacing:2px;color:var(--black);font-weight:700;}
.sl{flex:1;height:1px;background:var(--border);}
table{width:100%;border-collapse:collapse;table-layout:fixed;}
td,th{overflow:hidden;text-overflow:ellipsis;word-break:break-all;}
.val-lg{font-size:17px;font-weight:700;color:var(--gold);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.val-xl{font-size:21px;font-weight:700;color:var(--gold);line-height:1.2;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lbl{font-size:7.5px;font-weight:300;color:var(--muted);letter-spacing:0.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.txt{font-size:9px;color:var(--dark);line-height:1.7;overflow:hidden;}
.txt-sm{font-size:7.5px;color:var(--muted);line-height:1.6;overflow:hidden;}
.hd-gold{font-size:8.5px;font-weight:700;color:var(--gold);margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--gold-border);}
@media print{
  body{background:none;overflow:visible;}
  .slide-wrapper{transform:none !important;}
  .page{box-shadow:none;width:100%;height:auto;aspect-ratio:16/9;}
}
</style>
</head>
<body>
<div class="slide-wrapper">

<div class="page">
  <div class="ph"><div class="ph-logo">COMMERCEX M&A</div><div class="ph-sec">07 — Deal Conditions</div></div>
  <div class="pc">
    <div class="sh"><div class="sn">07</div><div class="st">希望条件</div><div class="sl"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:2.5%;flex:1;min-height:0;overflow:hidden;">
      <div style="overflow:hidden;display:flex;flex-direction:column;">
        <div style="font-size:8.5px;font-weight:700;color:var(--gold);margin-bottom:0.8%;padding-bottom:0.5%;border-bottom:2px solid var(--gold);flex-shrink:0;">譲渡条件</div>
        <table style="flex:1;">
          <tr style="background:var(--surface);">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">譲渡スキーム</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{scheme}}</td>
          </tr>
          <tr style="">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">希望譲渡価額</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{price}}</td>
          </tr>
          <tr style="background:var(--surface);">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">支払方法</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{payment}}</td>
          </tr>
          <tr style="">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">希望クロージング</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{closing_timing}}</td>
          </tr>
          <tr style="background:var(--surface);">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">代表引継ぎ期間</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{handover_period}}</td>
          </tr>
          <tr style="">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">退職金</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{retirement}}</td>
          </tr>
          <tr style="background:var(--surface);">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">借入の個人保証債務</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{guarantee}}</td>
          </tr>
          <tr style="">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">希望買手像</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{ideal_buyer}}</td>
          </tr>
          <tr style="background:var(--surface);">
            <td style="padding:0.8% 1.5%;color:var(--muted);font-size:8.5px;font-weight:500;width:35%;vertical-align:top;border-bottom:1px solid var(--border-light);">その他</td>
            <td style="padding:0.8% 1.5%;color:var(--dark);font-size:9px;border-bottom:1px solid var(--border-light);">{{other}}</td>
          </tr>
        </table>
      </div>
      <div style="display:flex;flex-direction:column;gap:1%;overflow:hidden;">
        <div style="font-size:8.5px;font-weight:700;color:var(--gold);margin-bottom:0.3%;padding-bottom:0.5%;border-bottom:2px solid var(--gold);flex-shrink:0;">譲渡理由</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);padding:2% 2%;flex:1;overflow:hidden;display:flex;flex-direction:column;">
          <div class="txt" style="flex:1;line-height:2.0;">{{transfer_reason}}</div>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
<script>
(function(){
  var w=document.querySelector('.slide-wrapper');
  function fit(){
    var sx=window.innerWidth/960,sy=window.innerHeight/540;
    var s=Math.min(sx,sy)*0.95;
    w.style.transform='scale('+s+')';
  }
  fit();
  window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
