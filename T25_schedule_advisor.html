<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>次のステップ | CommerceX M&A</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C49000;--gold-light:#F0C830;--cream:#FFF7DC;--gold-border:rgba(196,144,0,0.3);
  --black:#111111;--dark:#333333;--medium:#555555;--muted:#888888;
  --surface:#F5F5F3;--border:#E0E0E0;--border-light:#F0F0F0;--white:#FFFFFF;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Noto Sans JP',sans-serif;
  background:#CCCAC7;color:var(--black);line-height:1.6;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;overflow:hidden;
}
.slide-wrapper{width:960px;height:540px;transform-origin:center center;}
.page{
  width:960px;height:540px;background:var(--white);
  box-shadow:0 4px 24px rgba(0,0,0,0.12);
  position:relative;overflow:hidden;display:flex;flex-direction:column;
}
.ph{display:flex;justify-content:space-between;align-items:center;padding:0 48px;height:38px;border-bottom:1px solid var(--border-light);flex-shrink:0;}
.ph-logo{font-size:8px;font-weight:900;letter-spacing:2px;color:var(--muted);}
.ph-sec{font-size:8px;color:var(--muted);font-weight:300;letter-spacing:1px;}
.pc{flex:1 1 0%;padding:15px 48px 16px;overflow:hidden;min-height:0;display:flex;flex-direction:column;}
.sh{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-shrink:0;}
.sn{font-size:12px;font-weight:900;color:var(--gold);}
.st{font-size:13px;letter-spacing:2px;color:var(--black);font-weight:700;}
.sl{flex:1;height:1px;background:var(--border);}
.txt{font-size:9px;color:var(--dark);line-height:1.7;overflow:hidden;}
.txt-sm{font-size:7.5px;color:var(--muted);line-height:1.6;overflow:hidden;}
@media print{
  body{background:none;overflow:visible;}
  .slide-wrapper{transform:none !important;}
  .page{box-shadow:none;width:100%;height:auto;aspect-ratio:16/9;}
}
</style>
</head>
<body>
<div class="slide-wrapper">

<div class="page">
  <div class="ph"><div class="ph-logo">COMMERCEX M&A</div><div class="ph-sec">07 — Next Steps</div></div>
  <div class="pc">
    <div class="sh"><div class="sn">07</div><div class="st">次のステップ</div><div class="sl"></div></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0;overflow:hidden;">

      <!-- 左カラム：ステップ1〜4 -->
      <div style="display:flex;flex-direction:column;gap:8px;overflow:hidden;">
        <div style="display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);overflow:hidden;flex:1;">
          <div style="width:26px;height:26px;background:var(--gold);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900;">1</div>
          <div style="flex:1;overflow:hidden;">
            <div style="font-size:10px;font-weight:700;color:var(--dark);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{next_1_title}}</div>
            <div class="txt-sm">{{next_1_desc}}</div>
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);overflow:hidden;flex:1;">
          <div style="width:26px;height:26px;background:var(--gold);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900;">2</div>
          <div style="flex:1;overflow:hidden;">
            <div style="font-size:10px;font-weight:700;color:var(--dark);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{next_2_title}}</div>
            <div class="txt-sm">{{next_2_desc}}</div>
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);overflow:hidden;flex:1;">
          <div style="width:26px;height:26px;background:var(--gold);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900;">3</div>
          <div style="flex:1;overflow:hidden;">
            <div style="font-size:10px;font-weight:700;color:var(--dark);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{next_3_title}}</div>
            <div class="txt-sm">{{next_3_desc}}</div>
          </div>
        </div>
        <div style="display:flex;gap:10px;align-items:flex-start;padding:10px 12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--gold);overflow:hidden;flex:1;">
          <div style="width:26px;height:26px;background:var(--gold);color:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:900;">4</div>
          <div style="flex:1;overflow:hidden;">
            <div style="font-size:10px;font-weight:700;color:var(--dark);margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">{{next_4_title}}</div>
            <div class="txt-sm">{{next_4_desc}}</div>
          </div>
        </div>
      </div>

      <!-- 右カラム：手数料体系＋補足 -->
      <div style="display:flex;flex-direction:column;gap:8px;overflow:hidden;">
        <div style="background:var(--black);padding:10px 14px;flex-shrink:0;">
          <div style="font-size:7px;font-weight:700;color:var(--gold-light);letter-spacing:2px;margin-bottom:2px;">FEE STRUCTURE</div>
          <div style="font-size:12px;font-weight:900;color:var(--white);">手数料体系</div>
        </div>
        <div style="flex:1;background:var(--surface);border:1px solid var(--border);padding:12px 14px;overflow:hidden;display:flex;flex-direction:column;">
          <div class="txt" style="flex:1;line-height:2.2;">{{fee_structure}}</div>
        </div>
        <div style="background:var(--cream);border:1px solid var(--gold-border);border-left:3px solid var(--gold);padding:8px 12px;overflow:hidden;">
          <div style="font-size:7.5px;font-weight:700;color:var(--gold);margin-bottom:2px;">補足事項</div>
          <div class="txt-sm">{{fee_note}}</div>
        </div>
      </div>
    </div>
  </div>
</div>

</div>
<script>
(function(){
  var w=document.querySelector('.slide-wrapper');
  function fit(){
    var sx=window.innerWidth/960,sy=window.innerHeight/540;
    var s=Math.min(sx,sy)*0.95;
    w.style.transform='scale('+s+')';
  }
  fit();
  window.addEventListener('resize',fit);
})();
</script>
</body>
</html>
